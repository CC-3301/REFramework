name: Dev Release
on: [push, workflow_dispatch]

env:
  BUILD_TYPE: Release
  CMAKE_GENERATOR: "Visual Studio 17 2022"

jobs:
  csharp-release:
    runs-on: windows-2022  # 明确使用windows-2022
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v1.3
        with:
          vs-version: '17.0'

      - name: Configure CMake
        run: |
          # 设置VS环境变量
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S ${{github.workspace}}/csharp-api -B ${{github.workspace}}/csharp-api/build -G "${{env.CMAKE_GENERATOR}}" -A x64 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        shell: cmd

      - name: Build
        run: cmake --build ${{github.workspace}}/csharp-api/build --config ${{env.BUILD_TYPE}} --target ALL_BUILD

      - name: Prepare release
        working-directory: ${{github.workspace}}/csharp-api
        run: |
          pip install -r requirements.txt
          python make_symlinks.py --gamedir="${{github.workspace}}/csharp-api" --bindir="${{github.workspace}}/csharp-api/build/bin" --just_copy=True --skip_test_scripts=True

      - name: Compress release
        working-directory: ${{github.workspace}}/csharp-api
        run: 7z a ${{github.workspace}}/csharp-api.zip reframework

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: csharp-api
          path: ${{github.workspace}}/csharp-api.zip
          if-no-files-found: error

  dev-release:
    runs-on: windows-2022  # 明确使用windows-2022
    strategy:
      matrix:
        target: [RE2, RE2_TDB66, RE3, RE3_TDB67, RE4, RE7, RE7_TDB49, RE8, RE9, DMC5, MHRISE, SF6, DD2, MHWILDS, PRAGMATA, MHSTORIES3]
      max-parallel: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Visual Studio
        uses: microsoft/setup-msbuild@v1.3
        with:
          vs-version: '17.0'

      - name: Configure CMake
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -S ${{github.workspace}} -B ${{github.workspace}}/build -G "${{env.CMAKE_GENERATOR}}" -A x64 -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}} -DDEVELOPER_MODE=ON "-DCMAKE_POLICY_VERSION_MINIMUM=3.5"
        shell: cmd

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}} --target ${{matrix.target}}

      - name: Prepare files
        run: |
          echo ${{github.sha}} > ${{github.workspace}}/reframework_revision.txt
          echo none > ${{github.workspace}}/DELETE_OPENVR_API_DLL_IF_YOU_WANT_TO_USE_OPENXR

      - name: Compress release
        run: |
          7z a ${{github.workspace}}/${{matrix.target}}.zip ${{github.workspace}}/reframework_revision.txt
          7z a ${{github.workspace}}/${{matrix.target}}.zip ${{github.workspace}}/DELETE_OPENVR_API_DLL_IF_YOU_WANT_TO_USE_OPENXR
          7z a ${{github.workspace}}/${{matrix.target}}.zip ${{github.workspace}}/build/bin/${{matrix.target}}/dinput8.dll
          7z a ${{github.workspace}}/${{matrix.target}}.zip ${{github.workspace}}/dependencies/openvr/bin/win64/openvr_api.dll
          if exist "${{github.workspace}}/build/_deps/openxr-build/src/loader/${{env.BUILD_TYPE}}/openxr_loader.dll" (
            7z a ${{github.workspace}}/${{matrix.target}}.zip ${{github.workspace}}/build/_deps/openxr-build/src/loader/${{env.BUILD_TYPE}}/openxr_loader.dll
          )
          7z a ${{github.workspace}}/${{matrix.target}}.zip ${{github.workspace}}/scripts
          7z rn ${{github.workspace}}/${{matrix.target}}.zip scripts reframework/autorun

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{matrix.target}}
          path: ${{github.workspace}}/${{matrix.target}}.zip
          if-no-files-found: error

  nightly-push:
    runs-on: windows-2022
    needs: [dev-release, csharp-release]
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{github.workspace}}/artifacts

      - name: Set padded run number
        run: |
          $paddedRunNumber = "{0:D5}" -f ${{ github.run_number }}
          echo "RUN_NUMBER=$paddedRunNumber" >> $env:GITHUB_ENV
        shell: powershell

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          repo: REFramework-nightly
          owner: praydog
          token: ${{ secrets.REPO_TOKEN }}
          name: ${{format('REF Nightly {0} ({1})', env.RUN_NUMBER, github.sha)}}
          tag: ${{format('nightly-{0}-{1}', env.RUN_NUMBER, github.sha)}}
          artifacts: ${{github.workspace}}/artifacts/**/*.zip
          makeLatest: true
          bodyFile: ${{github.workspace}}/nightly-body.md
          allowUpdates: true
